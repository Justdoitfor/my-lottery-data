name: 更新彩票开奖数据

on:
  schedule:
    # 北京时间每天 22:35 触发（UTC 14:35，开奖约 21:30，留 65 分钟缓冲）
    - cron: "35 14 * * *"
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write      # 需要推送数据文件

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: |
          pip install requests beautifulsoup4 --quiet

      - name: 运行更新脚本
        run: python scripts/update.py all

      - name: 检查是否有数据变更
        id: check
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "数据无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到新数据，准备提交"
          fi

      - name: 提交并推送
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 从 latest.json 读取最新期次写入提交信息
          SSQ_ISSUE=$(python3 -c "import json; d=json.load(open('data/latest.json')); print(d['lotteries']['ssq']['issue'])" 2>/dev/null || echo "?")
          DLT_ISSUE=$(python3 -c "import json; d=json.load(open('data/latest.json')); print(d['lotteries']['dlt']['issue'])" 2>/dev/null || echo "?")
          git commit -m "数据更新: 双色球 ${SSQ_ISSUE} / 大乐透 ${DLT_ISSUE}"
          git push
